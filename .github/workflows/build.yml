name: Build

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  build:
    name: macOS
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6.2.0

      - name: Set up Java
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Build
        run: ./gradlew build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mousee-macos
          path: build/libs/
