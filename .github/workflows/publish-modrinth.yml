name: Publish to Modrinth

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version_type:
        description: Modrinth version type.
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: Changelog text for the Modrinth version.
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  build:
    name: Build macOS jar
    runs-on: macos-15
    outputs:
      mod_version: ${{ steps.metadata.outputs.mod_version }}
      minecraft_version: ${{ steps.metadata.outputs.minecraft_version }}
      version_type: ${{ steps.metadata.outputs.version_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6.2.0

      - name: Set up Java
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Resolve release metadata
        id: metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          DISPATCH_CHANGELOG: ${{ inputs.changelog }}
          DISPATCH_VERSION_TYPE: ${{ inputs.version_type }}
        run: |
          mkdir -p build/release

          ./gradlew -q printReleaseMetadata > build/release/metadata.properties

          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < build/release/metadata.properties

          if [ "$EVENT_NAME" = "release" ]; then
            printf '%s\n' "$RELEASE_BODY" > build/release/changelog.md
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              version_type=beta
            else
              version_type=release
            fi
          else
            printf '%s\n' "$DISPATCH_CHANGELOG" > build/release/changelog.md
            version_type="$DISPATCH_VERSION_TYPE"
          fi

          echo "version_type=$version_type" >> "$GITHUB_OUTPUT"

      - name: Build release jar
        run: ./gradlew build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mousee-release
          path: |
            build/libs/mousee-${{ steps.metadata.outputs.mod_version }}.jar
            build/release/changelog.md

  publish:
    name: Modrinth
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6.2.0

      - name: Set up Java
        uses: actions/setup-java@v5.3.0
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: mousee-release
          path: release

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_ID: ${{ secrets.MODRINTH_ID }}
          MODRINTH_VERSION_TYPE: ${{ needs.build.outputs.version_type }}
          MODRINTH_UPLOAD_FILE: release/mousee-${{ needs.build.outputs.mod_version }}.jar
          MODRINTH_CHANGELOG_FILE: release/changelog.md
        run: ./gradlew modrinth
